<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiBot — Chatbot FAQ Akademik</title>
    <meta name="description" content="AcademiBot: Chatbot FAQ Akademik dan Reservasi Konsultasi Dosen berbasis NLP">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 10 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <span class="logo-text">AcademiBot</span>
                </div>
            </div>
            <div class="sidebar-menu">
                <div class="menu-section-title">MENU</div>
                <button class="menu-item active" id="btn-chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Chat</span>
                </button>
                <button class="menu-item" id="btn-new-chat" onclick="resetChat()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Chat Baru</span>
                </button>
                <div class="menu-section-title">TOPIK</div>
                <button class="menu-item topic-btn" onclick="sendQuickMessage('Bagaimana cara mengisi KRS?')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span>Info KRS</span>
                </button>
                <button class="menu-item topic-btn" onclick="sendQuickMessage('Apa syarat pendaftaran sidang tugas akhir?')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="7"></circle>
                        <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
                    </svg>
                    <span>Info Sidang</span>
                </button>
                <button class="menu-item topic-btn" onclick="sendQuickMessage('Saya ingin reservasi bimbingan dosen')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Reservasi Bimbingan</span>
                </button>
            </div>
            <div class="sidebar-footer">
                <div class="footer-info">
                    <small>Powered by NLP &amp; Machine Learning</small>
                    <small>© 2025 AcademiBot</small>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <header class="chat-header">
                <button class="mobile-menu-toggle" id="mobile-menu-btn" onclick="toggleSidebar()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="header-info">
                    <div class="header-avatar">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 10 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <div class="header-text">
                        <h1>AcademiBot</h1>
                        <span class="status-text">
                            <span class="status-dot"></span>
                            Online — Siap Membantu
                        </span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="resetChat()" title="Chat Baru">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="welcome-section" id="welcome-section">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 10 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <h2>Selamat Datang di AcademiBot! 🎓</h2>
                    <p>Asisten virtual untuk FAQ Akademik dan Reservasi Konsultasi Dosen.</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="sendQuickMessage('Halo')">
                            <span class="quick-icon">👋</span>
                            <span>Mulai Chat</span>
                        </button>
                        <button class="quick-btn" onclick="sendQuickMessage('Bagaimana cara mengisi KRS?')">
                            <span class="quick-icon">📋</span>
                            <span>Info KRS</span>
                        </button>
                        <button class="quick-btn" onclick="sendQuickMessage('Apa syarat pendaftaran sidang?')">
                            <span class="quick-icon">🎓</span>
                            <span>Info Sidang</span>
                        </button>
                        <button class="quick-btn" onclick="sendQuickMessage('Saya ingin reservasi bimbingan dosen')">
                            <span class="quick-icon">📅</span>
                            <span>Reservasi Bimbingan</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="typing-avatar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c3 3 10 3 12 0v-5"></path>
                    </svg>
                </div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input-container">
                <form class="chat-input-form" id="chat-form" onsubmit="return sendMessage(event)">
                    <div class="input-wrapper">
                        <textarea
                            id="user-input"
                            placeholder="Ketik pesan Anda..."
                            rows="1"
                            autocomplete="off"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button type="submit" class="send-btn" id="send-btn" title="Kirim Pesan">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="input-hint">
                        Tekan <kbd>Enter</kbd> untuk kirim · <kbd>Shift+Enter</kbd> untuk baris baru
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // ================================================================
        // AcademiBot Frontend JavaScript
        // ================================================================

        const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const welcomeSection = document.getElementById('welcome-section');

        // Auto-resize textarea
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // Handle keyboard
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(e);
            }
        }

        // Toggle sidebar (mobile)
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
        }

        // Format bot response (markdown-lite)
        function formatResponse(text) {
            // Bold: **text**
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Italic: _text_
            text = text.replace(/_(.*?)_/g, '<em>$1</em>');
            // Line breaks
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        // Add message bubble to chat
        function addMessage(content, sender) {
            // Hide welcome section on first message
            if (welcomeSection) {
                welcomeSection.style.display = 'none';
            }

            const msgWrapper = document.createElement('div');
            msgWrapper.className = `message-wrapper ${sender}`;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            if (sender === 'bot') {
                msgWrapper.innerHTML = `
                    <div class="message-avatar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 10 3 12 0v-5"></path>
                        </svg>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble">${formatResponse(content)}</div>
                        <span class="message-time">${timeStr}</span>
                    </div>
                `;
            } else {
                msgWrapper.innerHTML = `
                    <div class="message-content">
                        <div class="message-bubble">${content}</div>
                        <span class="message-time">${timeStr}</span>
                    </div>
                `;
            }

            // Animate entry
            msgWrapper.style.opacity = '0';
            msgWrapper.style.transform = 'translateY(12px)';
            chatMessages.appendChild(msgWrapper);

            requestAnimationFrame(() => {
                msgWrapper.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                msgWrapper.style.opacity = '1';
                msgWrapper.style.transform = 'translateY(0)';
            });

            scrollToBottom();
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatMessages.scrollTo({
                top: chatMessages.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Show/Hide typing indicator
        function showTyping() {
            typingIndicator.style.display = 'flex';
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        // Send message
        async function sendMessage(e) {
            if (e) e.preventDefault();

            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');

            // Clear input
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Show typing indicator
            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                    }),
                });

                const data = await response.json();

                // Simulate slight delay for natural feel
                await new Promise(resolve => setTimeout(resolve, 600));

                hideTyping();
                addMessage(data.response, 'bot');

            } catch (error) {
                hideTyping();
                addMessage('⚠️ Maaf, terjadi kesalahan koneksi. Silakan coba lagi.', 'bot');
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        // Quick message from buttons
        function sendQuickMessage(msg) {
            userInput.value = msg;
            sendMessage(null);
            // Close sidebar on mobile
            document.querySelector('.sidebar').classList.remove('open');
        }

        // Reset chat
        async function resetChat() {
            // Reset server session
            try {
                await fetch('/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId }),
                });
            } catch (e) { /* ignore */ }

            // Clear messages
            chatMessages.innerHTML = '';

            // Restore welcome section
            const welcome = document.createElement('div');
            welcome.className = 'welcome-section';
            welcome.id = 'welcome-section';
            welcome.innerHTML = `
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c3 3 10 3 12 0v-5"></path>
                    </svg>
                </div>
                <h2>Selamat Datang di AcademiBot! 🎓</h2>
                <p>Asisten virtual untuk FAQ Akademik dan Reservasi Konsultasi Dosen.</p>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuickMessage('Halo')">
                        <span class="quick-icon">👋</span>
                        <span>Mulai Chat</span>
                    </button>
                    <button class="quick-btn" onclick="sendQuickMessage('Bagaimana cara mengisi KRS?')">
                        <span class="quick-icon">📋</span>
                        <span>Info KRS</span>
                    </button>
                    <button class="quick-btn" onclick="sendQuickMessage('Apa syarat pendaftaran sidang?')">
                        <span class="quick-icon">🎓</span>
                        <span>Info Sidang</span>
                    </button>
                    <button class="quick-btn" onclick="sendQuickMessage('Saya ingin reservasi bimbingan dosen')">
                        <span class="quick-icon">📅</span>
                        <span>Reservasi Bimbingan</span>
                    </button>
                </div>
            `;
            chatMessages.appendChild(welcome);

            // Close sidebar on mobile
            document.querySelector('.sidebar').classList.remove('open');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(e) {
            const sidebar = document.querySelector('.sidebar');
            const menuBtn = document.getElementById('mobile-menu-btn');
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
